name: Release

# Tag-driven CD: push a `v*` tag → build the DM Whisper installer for Windows, macOS
# (Apple Silicon) and Linux, then a SINGLE publish job collects all three and creates one
# draft GitHub Release. Review the draft on the Releases page and hit "Publish release".
#
#   git tag v0.1.0 && git push origin v0.1.0
#
# Two stages on purpose: the matrix builds with `--publish never` and uploads artifacts; a
# lone publish job creates the Release. Letting each matrix leg publish concurrently races —
# they each try to create the same draft and you get TWO drafts split across platforms.
#
# `workflow_dispatch` runs only the build matrix (no publish) and leaves the installers as
# workflow artifacts so you can smoke-test before tagging.
on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write          # publish job creates/uploads the Release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-latest, platform: win }
          - { os: macos-14,       platform: mac }    # Apple Silicon (arm64)
          - { os: ubuntu-latest,  platform: linux }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # The tag must match voice-hud/package.json version — the publish job names the Release
      # from the tag, and a mismatch means installers labelled differently than the Release.
      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(node -p "require('./voice-hud/package.json').version")"
          echo "tag=$tag package=$pkg"
          [ "$tag" = "$pkg" ] || { echo "::error::tag v$tag != package version $pkg"; exit 1; }

      - name: Install root deps (inputs to the esbuild server bundle)
        run: npm ci

      - name: Install voice-hud deps
        working-directory: voice-hud
        run: npm ci

      - name: Fetch whisper assets (Windows — prebuilt zip)
        if: matrix.platform == 'win'
        working-directory: voice-hud
        shell: pwsh
        run: ./scripts/fetch-whisper.ps1

      - name: Fetch whisper assets (mac/linux — build static from source)
        if: matrix.platform != 'win'
        working-directory: voice-hud
        run: bash scripts/fetch-whisper.sh

      - name: Build gem (tsc)
        working-directory: voice-hud
        run: npm run build

      - name: Bundle server (esbuild)
        working-directory: voice-hud
        run: npm run bundle:server

      # BUILD ONLY — no publish here. The publish job (below) uploads everything at once so
      # the matrix legs never race to create the draft Release.
      - name: Build installer (no publish)
        working-directory: voice-hud
        run: npx --yes electron-builder --publish never

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dmwhisper-${{ matrix.platform }}
          path: |
            voice-hud/release/*.exe
            voice-hud/release/*.dmg
            voice-hud/release/*.AppImage
            voice-hud/release/*.yml
            voice-hud/release/*.blockmap
          if-no-files-found: ignore

  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download all installer artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true     # flatten every platform's files into dist/

      - name: Create draft Release with all installers
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Collect into an array so filenames are space-safe; skip the debug yml.
          mapfile -t files < <(find dist -type f ! -name 'builder-debug.yml')
          echo "publishing:"; printf '%s\n' "${files[@]}"
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --draft \
            --title "DM Whisper ${GITHUB_REF_NAME#v}" \
            --notes "Automated build — release notes pending." \
            "${files[@]}"
