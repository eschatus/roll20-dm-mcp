<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>DM Whisper — A/B clip recorder</title>
<style>
  :root { color-scheme: dark; }
  body { font: 15px/1.5 system-ui, sans-serif; background: #15121c; color: #e8e2f0; margin: 0; padding: 24px; }
  .wrap { max-width: 560px; margin: 0 auto; }
  h1 { font-size: 18px; font-weight: 600; margin: 0 0 4px; }
  .sub { color: #9b90b5; font-size: 13px; margin-bottom: 20px; }
  #rec { width: 100%; padding: 22px; font-size: 17px; font-weight: 600; border: none; border-radius: 14px;
         background: #3a2d52; color: #e8e2f0; cursor: pointer; user-select: none; touch-action: none; transition: background .08s; }
  #rec.live { background: #b23a4e; }
  #rec:disabled { opacity: .5; cursor: default; }
  label { display: block; font-size: 12px; color: #9b90b5; margin: 16px 0 4px; text-transform: uppercase; letter-spacing: .04em; }
  input, textarea { width: 100%; box-sizing: border-box; background: #1d1828; border: 1px solid #352b48; color: #e8e2f0;
                    border-radius: 8px; padding: 9px 11px; font: inherit; }
  textarea { resize: vertical; min-height: 56px; }
  audio { width: 100%; margin-top: 12px; }
  #save { margin-top: 16px; width: 100%; padding: 13px; font-size: 15px; font-weight: 600; border: none; border-radius: 10px;
          background: #4a8f5e; color: #fff; cursor: pointer; }
  #save:disabled { opacity: .4; cursor: default; }
  .status { margin-top: 18px; font-size: 13px; color: #9b90b5; }
  .msg { margin-top: 10px; font-size: 13px; min-height: 18px; }
  .ok { color: #7fd99a; } .err { color: #ff8a9b; }
  kbd { background:#2a2238; border:1px solid #3a2f4f; border-radius:4px; padding:1px 5px; font-size:12px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>A/B clip recorder</h1>
  <div class="sub">Hold the button (or <kbd>Space</kbd>) and speak a real table line. Release, type what you actually
    said, Save. Clips land in <code>data/ab-clips/</code> in the exact 16 kHz format the gem produces.</div>

  <button id="rec">🎙 Hold to record</button>

  <audio id="play" controls hidden></audio>

  <label for="name">Filename</label>
  <input id="name" autocomplete="off" spellcheck="false" />

  <label for="ref">Reference — exactly what you said (enables WER + name scoring)</label>
  <textarea id="ref" placeholder="Strahd advances on Ireena and rolls a DC 15 dexterity save"></textarea>

  <button id="save" disabled>Save to corpus</button>
  <div class="msg" id="msg"></div>
  <div class="status" id="status">…</div>
</div>

<script>
// ── capture (copied verbatim from renderer/gem.js so clips are byte-identical) ──
let capturing = false, audioCtx, source, processor, stream, chunks = [], inRate = 48000;
let lastWavB64 = null;

async function startCapture() {
  if (capturing) return;
  capturing = true; chunks = [];
  try {
    stream = await navigator.mediaDevices.getUserMedia({ audio: { channelCount: 1, echoCancellation: true, noiseSuppression: true } });
  } catch (e) { capturing = false; setMsg("no microphone: " + e.message, true); return; }
  audioCtx = new AudioContext(); inRate = audioCtx.sampleRate;
  source = audioCtx.createMediaStreamSource(stream);
  processor = audioCtx.createScriptProcessor(4096, 1, 1);
  source.connect(processor); processor.connect(audioCtx.destination);
  processor.onaudioprocess = (e) => { if (capturing) chunks.push(new Float32Array(e.inputBuffer.getChannelData(0))); };
}
async function stopCapture() {
  if (!capturing) return; capturing = false;
  try { processor && (processor.onaudioprocess = null); } catch {}
  try { source && source.disconnect(); } catch {}
  try { processor && processor.disconnect(); } catch {}
  try { stream && stream.getTracks().forEach((t) => t.stop()); } catch {}
  try { audioCtx && (await audioCtx.close()); } catch {}
  const wav = encodeWav(mergeChunks(chunks), inRate, 16000); chunks = [];
  if (wav.byteLength <= 44) { setMsg("empty clip — hold longer", true); return; }
  lastWavB64 = abToB64(wav);
  const url = URL.createObjectURL(new Blob([wav], { type: "audio/wav" }));
  const play = document.getElementById("play"); play.src = url; play.hidden = false;
  document.getElementById("save").disabled = false;
  setMsg("recorded " + (wav.byteLength / 1024 | 0) + " KB — play it back, type the reference, Save", false);
}
function mergeChunks(list) {
  let len = 0; for (const c of list) len += c.length;
  const out = new Float32Array(len); let off = 0; for (const c of list) { out.set(c, off); off += c.length; } return out;
}
function encodeWav(samples, inRate, targetRate) {
  const ratio = inRate / targetRate, outLen = Math.floor(samples.length / ratio), out = new Int16Array(outLen);
  for (let i = 0; i < outLen; i++) { const s = samples[Math.floor(i * ratio)] || 0; const c = Math.max(-1, Math.min(1, s)); out[i] = c < 0 ? c * 0x8000 : c * 0x7fff; }
  const buffer = new ArrayBuffer(44 + out.length * 2), view = new DataView(buffer);
  const w = (off, str) => { for (let i = 0; i < str.length; i++) view.setUint8(off + i, str.charCodeAt(i)); };
  w(0, "RIFF"); view.setUint32(4, 36 + out.length * 2, true); w(8, "WAVE");
  w(12, "fmt "); view.setUint32(16, 16, true); view.setUint16(20, 1, true);
  view.setUint16(22, 1, true); view.setUint32(24, targetRate, true);
  view.setUint32(28, targetRate * 2, true); view.setUint16(32, 2, true); view.setUint16(34, 16, true);
  w(36, "data"); view.setUint32(40, out.length * 2, true);
  let off = 44; for (let i = 0; i < out.length; i++, off += 2) view.setInt16(off, out[i], true);
  return buffer;
}
function abToB64(buf) {
  let bin = ""; const bytes = new Uint8Array(buf), chunk = 0x8000;
  for (let i = 0; i < bytes.length; i += chunk) bin += String.fromCharCode.apply(null, bytes.subarray(i, i + chunk));
  return btoa(bin);
}

// ── UI wiring ──
const recBtn = document.getElementById("rec");
function press() { if (recBtn.disabled) return; recBtn.classList.add("live"); recBtn.textContent = "● recording…"; startCapture(); }
function release() { recBtn.classList.remove("live"); recBtn.textContent = "🎙 Hold to record"; stopCapture(); }
recBtn.addEventListener("pointerdown", (e) => { e.preventDefault(); press(); });
recBtn.addEventListener("pointerup", release);
recBtn.addEventListener("pointerleave", () => { if (capturing) release(); });
window.addEventListener("keydown", (e) => { if (e.code === "Space" && !e.repeat && document.activeElement.tagName !== "TEXTAREA" && document.activeElement.tagName !== "INPUT") { e.preventDefault(); press(); } });
window.addEventListener("keyup", (e) => { if (e.code === "Space" && capturing) { e.preventDefault(); release(); } });

function setMsg(t, isErr) { const m = document.getElementById("msg"); m.textContent = t; m.className = "msg " + (isErr ? "err" : "ok"); }

async function refreshStatus() {
  try {
    const r = await fetch("/list"); const d = await r.json();
    document.getElementById("status").textContent =
      `corpus: ${d.count} clips, ${(d.bytes / 1e6).toFixed(0)} MB / ${(d.maxBytes / 1e6).toFixed(0)} MB cap (max ${d.maxFiles} files)`;
    if (!document.getElementById("name").value) document.getElementById("name").value = `clip-${String(d.count + 1).padStart(3, "0")}`;
  } catch {}
}

document.getElementById("save").addEventListener("click", async () => {
  if (!lastWavB64) return;
  const name = document.getElementById("name").value.trim();
  const ref = document.getElementById("ref").value.trim();
  if (!name) return setMsg("name the clip first", true);
  document.getElementById("save").disabled = true;
  try {
    const r = await fetch("/save", { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify({ name, ref, wavB64: lastWavB64 }) });
    const d = await r.json();
    if (!d.ok) { setMsg(d.error || "save failed", true); document.getElementById("save").disabled = false; return; }
    setMsg("saved " + d.file + (ref ? " (+ reference)" : " (no reference — WER off for this clip)"), false);
    lastWavB64 = null; document.getElementById("play").hidden = true;
    document.getElementById("ref").value = ""; document.getElementById("name").value = "";
    await refreshStatus();
  } catch (e) { setMsg("save error: " + e.message, true); document.getElementById("save").disabled = false; }
});

refreshStatus();
</script>
</body>
</html>
